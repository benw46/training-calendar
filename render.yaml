services:
  - type: web
    name: training-calendar-api
    runtime: python
    # eu-west-1 (the Supabase DB) is ~20-30ms from Frankfurt vs ~130-150ms
    # from Oregon, so co-locating the API here cuts the per-request auth +
    # DB-connect round trips roughly in half. Region is fixed at service
    # creation — this line only takes effect for a NEWLY created service.
    region: frankfurt
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GARMIN_EMAIL
        sync: false
      - key: GARMIN_PASSWORD
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false
